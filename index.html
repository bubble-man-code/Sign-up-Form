<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="styles.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGN UP</title>
</head>
<body>
<aside>
    <div class="logo_background">
<img src="pictures/odin-lined.png">
<h1 class="logo_hero">ODIN</h1>
    </div>
    <p class="credit_para">photo by <a class="credit_link" href="https://unsplash.com/@choys_">Conny Schneider</a> on <a class="credit_link" href="https://unsplash.com/">unsplash</a></p>
</aside>

<continer>
<h2 class="hero">Join over 4 dozen mildly enthusiastic humans  power of clicking a button. Sign up now and unlock exclusive access to things we haven't built yet</h2>
<h2 class="after_hero">Sign up. Become legendary.</h2>
<form action="" method="" > 
    <legend>Sgin up</legend>
    <div class="input_field">

    <label for="first_name">first name</label>
    <input type="text" id="first_name" name="first_name">

    <label for="second_name">second name</label>
    <input type="text" id="second_name" name="second_name">

    <label for="email">email</label>
    <input type="email" id="email" name="email">

    <label for="phone_number">phone number</label>
    <input type="number" id="phone_number" name="phone_number" placeholder="(555) 777-8888">

    <label for="password">password</label>
    <input type="password" id="password" name="password">

    <label for="confirm_password">confirm password</label>
    <input type="password" id="confirm_password" name="confirm_password">

    </div>
    <button type="submit" class="btn">Create Account</button>
<p>alredy have an Account?<a class="login_link" href="">log in</a></p>
</form>
</continer>
</body>
<script src="script.js"></script>
</html>
